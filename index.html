<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Terézváros Radar MVP</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
    color: #1f2933;
}
header {
    background: #111827;
    color: white;
    padding: 24px 40px;
}
.container {
    padding: 30px 40px;
}
.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}
textarea {
    width: 100%;
    height: 180px;
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
}
button {
    margin-top: 10px;
    padding: 12px 16px;
    background: #111827;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
pre {
    white-space: pre-wrap;
    background: #f1f5f9;
    padding: 15px;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
    <h1>Terézváros Radar</h1>
    <p>AI-alapú közéleti Facebook-poszt elemző MVP</p>
</header>

<div class="container">

    <div class="card">
        <h2>Facebook-poszt szövegének elemzése</h2>
        <p>Másold be ide egy nyilvános Facebook-poszt szövegét.</p>

        <textarea id="postText" placeholder="Ide másold a poszt szövegét..."></textarea>
        <br>
        <button onclick="analyzePost()">Elemzés indítása</button>
    </div>

    <div class="card">
        <h2>AI elemzés eredménye</h2>
        <pre id="result">Itt jelenik meg az összefoglaló, témák, hangulat és javasolt teendők.</pre>
    </div>

</div>

<script>
async function analyzePost() {
    const postText = document.getElementById("postText").value;
    const resultBox = document.getElementById("result");

    if (!postText || postText.length < 10) {
        resultBox.textContent = "Kérlek, másolj be legalább néhány mondatnyi posztszöveget.";
        return;
    }

    resultBox.textContent = "Elemzés folyamatban...";

    try {
        const response = await fetch("/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ postText })
        });

        const data = await response.json();

        if (data.result) {
            resultBox.textContent = data.result;
        } else {
            resultBox.textContent = "Hiba történt: " + JSON.stringify(data);
        }

    } catch (error) {
        resultBox.textContent = "Kapcsolódási hiba: " + error.message;
    }
}
</script>

</body>
</html>
